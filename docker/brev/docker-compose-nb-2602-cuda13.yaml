version: '3.8'

services:
  backend:
    image: nvcr.io/nvidia/rapidsai/notebooks:26.02-cuda13-py3.12
    pull_policy: always
    ulimits:
      memlock: -1
      stack: 67108864
    shm_size: 1g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
        EXTRA_PIP_PACKAGES: "anndata==0.12.10 array-api-compat==1.13.0 contourpy==1.3.3 cycler==0.12.1 decoupler==2.1.4 fonttools==4.61.0 h5py==3.15.1 imageio==2.37.0 joblib==1.5.3 kiwisolver==1.4.9 lazy-loader==0.4 legacy-api-wrap==1.5 llvmlite==0.44.0 matplotlib==3.10.8 natsort==8.4.0 networkx==3.6.1 numba==0.61.2 numpy==2.2.6 pandas==2.3.3 patsy==1.0.2 pillow==12.1.0 pynndescent==0.6.0 rapids-singlecell==0.14.1 scanpy==1.12 scikit-learn==1.8.0 scikit-image==0.26.0 scikit-misc==0.5.2 scipy==1.16.3 seaborn==0.13.2 session-info2==0.4 squidpy==1.8.1 statsmodels==0.14.6 threadpoolctl==3.6.0 tifffile==2026.1.28 tqdm==4.67.3 tzdata==2025.3 umap-learn==0.5.11 deprecated==1.3.1 numcodecs==0.16.5 wrapt==2.1.1 zarr==3.1.5"
    ports:
      - "0.0.0.0:8888:8888"      # JupyterLab
      - "0.0.0.0:8787:8787"      # Dask dashboard
      - "0.0.0.0:8786:8786"      # Dask scheduler
    volumes:
      - /home/shadeform/single-cell-analysis-blueprint:/notebooks/
    user: root
    working_dir: /notebooks
    entrypoint: ["/home/rapids/entrypoint.sh"]
    command: python -m jupyter lab --allow-root --ip=0.0.0.0 --no-browser --NotebookApp.token='' --NotebookApp.password='' --notebook-dir=/notebooks
    restart: unless-stopped

 
 